<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PULL OUT FORM</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

<style>
* { box-sizing: border-box; }

body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: linear-gradient(135deg, #66bb6a, #ff8c42);
}

/* CONTAINER */
.container {
    width: 95%;
    max-width: 1100px;
    margin: 30px auto;
    padding: 20px;
    background: rgba(255,255,255,0.15);
    border-radius: 12px;
}

/* SECTION */
.section {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
    padding: 15px;
    margin-bottom: 20px;
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 10px;
}

.Quantity,
.Description {
    grid-column: span 2;
}

/* ✅ FIXED GRID */
.Description {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
    gap: 15px;
}

/* ✅ ITEM CARD FIX */
.item-group {
    background: rgba(255,255,255,0.15);
    padding: 12px;
    border-radius: 10px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    border: 1px solid rgba(255,255,255,0.2);
}

/* CLEANER INPUT LOOK */
.item-group label {
    font-size: 12px;
    opacity: 0.85;
}

.item-group input,
.item-group select {
    padding: 6px;
    font-size: 13px;
}

/* INPUTS */
input, select {
    width: 100%;
    padding: 8px;
    margin-top: 5px;
}

/* BUTTONS */
.btn {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    background: #ff8c42;
    border: none;
    color: white;
    cursor: pointer;
}

.remove-btn {
    background: red;
    color: white;
    padding: 5px;
    border: none;
    cursor: pointer;
    margin-bottom: 10px;
}

/* MOBILE */
@media(max-width:768px){
    .section { grid-template-columns: 1fr; }
}
</style>
</head>

<body>

<div class="container">
<h2>PULL OUT FORM</h2>

<div id="sections">

<div class="section">

<button class="remove-btn" onclick="removeSection(this)">Remove</button>

<div>
<label>Equipment</label>
<select class="Peripherals" onchange="updateBrand(this)">
<option value="">Select</option>
<option>Computer</option>
<option>Keyboard</option>
<option>Monitor</option>
<option>UPS</option>
<option>Cash Drawer</option>
<option>Hard Drive</option>
</select>
</div>

<div>
<label>Brand</label>
<select class="brand" disabled>
<option>Select first</option>
</select>
</div>

<div class="Quantity">
<label>Quantity</label>
<input type="number" oninput="generateItems(this)">
</div>

<div class="Description"></div>

</div>

</div>

<button class="btn" onclick="addSection()">+ Add Peripheral</button>
<button class="btn" onclick="exportPDF()">Export PDF</button>

</div>

<script>

/* ADD SECTION */
function addSection(){
    const clone = document.querySelector(".section").cloneNode(true);

    clone.querySelectorAll("input").forEach(i=>i.value="");
    clone.querySelectorAll("select").forEach(s=>{
        s.selectedIndex=0;
        if(s.classList.contains("brand")){
            s.disabled=true;
        }
    });

    clone.querySelector(".Description").innerHTML="";

    document.getElementById("sections").appendChild(clone);

    toggleRemoveButtons();
}

/* REMOVE */
function removeSection(btn){
    const sections=document.querySelectorAll(".section");

    if(sections.length===1){
        alert("At least one required");
        return;
    }

    btn.closest(".section").remove();
    toggleRemoveButtons();
}

/* TOGGLE REMOVE */
function toggleRemoveButtons(){
    const sections=document.querySelectorAll(".section");

    sections.forEach(sec=>{
        const btn=sec.querySelector(".remove-btn");
        btn.style.display = sections.length===1 ? "none":"block";
    });
}

/* BRAND */
function updateBrand(sel){
    const brand=sel.closest(".section").querySelector(".brand");
    brand.disabled=false;
    brand.innerHTML="<option>Brand A</option><option>Brand B</option>";
}

/* ITEMS */
function generateItems(input){
    const section=input.closest(".section");
    const count=parseInt(input.value)||0;
    const container=section.querySelector(".Description");

    container.innerHTML="";

    for(let i=1;i<=count;i++){
        const wrap=document.createElement("div");
        wrap.className="item-group";

        wrap.innerHTML=`
        <label>Serial ${i}</label>
        <input>
        <label>Description ${i}</label>
        <input>
        <label>Remark ${i}</label>
        <select>
            <option>Good</option>
            <option>Defective</option>
            <option>For Repair</option>
        </select>
        `;

        container.appendChild(wrap);
    }
}

/* PDF EXPORT */
function exportPDF(){
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF("l");

    const grouped={Good:[],Defective:[], "For Repair":[]};

    document.querySelectorAll(".section").forEach(sec=>{
        const eq=sec.querySelector(".Peripherals").value;
        const brand=sec.querySelector(".brand").value;

        const inputs=sec.querySelectorAll(".Description input");
        const selects=sec.querySelectorAll(".Description select");

        let r=0;

        for(let i=0;i<inputs.length;i+=2){
            const serial=inputs[i].value;
            const desc=inputs[i+1].value;
            const remark=selects[r].value;

            grouped[remark].push([eq,brand,serial,desc]);
            r++;
        }
    });

    let y=20;

    for(let key in grouped){
        if(grouped[key].length){
            pdf.text(key,10,y);
            y+=5;

            pdf.autoTable({
                startY:y,
                head:[["Equipment","Brand","Serial","Description"]],
                body:grouped[key]
            });

            y=pdf.lastAutoTable.finalY+10;
        }
    }

    pdf.save("report.pdf");
}

/* INIT */
toggleRemoveButtons();

</script>

</body>
</html>
