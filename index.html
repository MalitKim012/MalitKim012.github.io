<html>

<head>
    <style>
        body {
            background: linear-gradient(to bottom right, #F0FFF0, #FFF8DC);
        }
        .box {
            width: 200px;
            background: linear-gradient(to bottom right, #90EE90, #FFDAB9);
            border: none;
            padding: 10px;
            margin: 0 auto;
            text-align: center;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        h1, h2, p {
            text-align: center;
        }
        body {
            text-align: center;
        
        }
    </style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIS System</title>
</head>
<body>
    <h1>Welcome to the MIS System</h1>
    <p>This is the main page of the Management Information System.</p>
   <div class="box"><h2>login</h2>
    <form action="/login" method="post">
        <label for="username">Username:</label>
        <input type="text" id="username" name="username" required><br><br>
        <label for="password">Password:</label>
        <input type="password" id="password" name="password" required><br><br>
        <input type="submit" value="Login">
    </form>
</div> 
</body>
</html>
