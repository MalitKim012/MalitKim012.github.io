<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile Form</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

<style>
    * { box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
        min-height: 100vh;
        overflow-y: auto;
        background: linear-gradient(135deg, #66bb6a, #ff8c42);
    }

    .bg-glow {
        position: fixed;
        width: 200px;
        height: 200px;
        background: radial-gradient(circle, rgba(255,255,255,0.3), transparent 70%);
        border-radius: 50%;
        pointer-events: none;
        transform: translate(-50%, -50%);
        z-index: 1;
    }

    .container {
        position: relative;
        z-index: 2;
        width: 95%;
        max-width: 1100px;
        margin: 40px auto;
        background: rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(12px);
        border-radius: 16px;
        padding: 25px;
        border: 1px solid rgba(255, 255, 255, 0.3);
        box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    }

    h2 { text-align: center; color: white; }

    label {
        display: block;
        margin-top: 10px;
        color: white;
        font-size: 13px;
    }

    input, select {
        width: 100%;
        padding: 8px;
        margin-top: 4px;
        border-radius: 6px;
        border: none;
        outline: none;
        background: rgba(255,255,255,0.6);
    }

    .btn {
        width: 100%;
        margin-top: 18px;
        padding: 12px;
        border: none;
        border-radius: 8px;
        background: #ff8c42;
        color: white;
        font-size: 16px;
        cursor: pointer;
    }

    .btn:hover {
        background: #ff7043;
    }

    .section {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 15px;
        padding: 15px;
        border: 1px solid rgba(255,255,255,0.3);
        border-radius: 10px;
        margin-bottom: 20px;
    }

    .section .Quantity,
    .section .Description {
        grid-column: span 2;
    }

    /* ✅ LANDSCAPE GRID FOR ITEMS */
    .Description {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 15px;
    }

    .item-group {
        background: rgba(255,255,255,0.1);
        padding: 10px;
        border-radius: 8px;
    }

    @media (max-width: 768px) {
        .section {
            grid-template-columns: 1fr;
        }

        .Description {
            grid-template-columns: 1fr;
        }
    }
</style>
</head>

<body>

<div class="bg-glow"></div>

<div class="container">
<h2>PULL OUT FORM</h2>

<form>

<div id="sections">

<div class="section">

    <div>
        <label>Select Equipment</label>
        <select class="Peripherals" onchange="updateBrand(this)">
            <option value="">-- Choose an item --</option>
            <option value="Computer">Computer</option>
            <option value="Keyboard">Keyboard</option>
            <option value="Monitor">Monitor</option>
            <option value="UPS">UPS</option>
            <option value="Cash Drawer">Cash Drawer</option>
            <option value="Hard Drive">Hard Drive</option>
        </select>
    </div>

    <div>
        <label>BRAND</label>
        <select class="brand" disabled>
            <option>Select peripheral first</option>
        </select>
    </div>

    <div class="Quantity">
        <label>Quantity</label>
        <input type="number" min="0"
        placeholder="Enter quantity"
        oninput="generateItems(this)">
    </div>

    <div class="Description"></div>

</div>

</div>

<button type="button" class="btn" onclick="addSection()">+ Add Another Peripheral</button>
<button type="button" class="btn" onclick="exportPDF()">Export to PDF</button>

</form>
</div>

<script>

const glow = document.querySelector(".bg-glow");

document.addEventListener("mousemove", (e) => {
    glow.style.left = e.clientX + "px";
    glow.style.top = e.clientY + "px";
});

/* ADD SECTION */
function addSection() {
    const sections = document.getElementById("sections");
    const first = document.querySelector(".section");

    const clone = first.cloneNode(true);

    clone.querySelectorAll("input").forEach(i => i.value = "");
    clone.querySelectorAll("select").forEach(s => {
        s.selectedIndex = 0;
        if (s.classList.contains("brand")) {
            s.innerHTML = "<option>Select peripheral first</option>";
            s.disabled = true;
        }
    });

    clone.querySelector(".Description").innerHTML = "";

    sections.appendChild(clone);

    window.scrollTo({ top: document.body.scrollHeight, behavior: "smooth" });
}

/* BRAND */
function updateBrand(select) {
    const section = select.closest(".section");
    const brandSelect = section.querySelector(".brand");

    brandSelect.innerHTML = "";

    const value = select.value;

    if (!value) {
        brandSelect.disabled = true;
        brandSelect.innerHTML = "<option>Select peripheral first</option>";
        return;
    }

    brandSelect.disabled = false;

    let brands = [];

    if (value === "Computer") brands = ["Dell", "HP", "Lenovo", "Asus"];
    if (value === "Keyboard") brands = ["Logitech", "Razer", "Corsair"];
    if (value === "Monitor") brands = ["Samsung", "LG", "AOC"];
    if (value === "UPS") brands = ["APC", "CyberPower"];
    if (value === "Cash Drawer") brands = ["Epson", "Star Micronics"];
    if (value === "Hard Drive") brands = ["Seagate", "WD"];

    const opt = document.createElement("option");
    opt.textContent = "-- Select Brand --";
    brandSelect.appendChild(opt);

    brands.forEach(b => {
        const o = document.createElement("option");
        o.value = b;
        o.textContent = b;
        brandSelect.appendChild(o);
    });
}

/* ✅ GRID ITEM GENERATOR */
function generateItems(input) {
    const section = input.closest(".section");
    const count = parseInt(input.value) || 0;

    const container = section.querySelector(".Description");
    container.innerHTML = "";

    for (let i = 1; i <= count; i++) {

        const wrapper = document.createElement("div");
        wrapper.className = "item-group";

        const sLabel = document.createElement("label");
        sLabel.textContent = `Serial ${i}`;
        const sInput = document.createElement("input");

        const dLabel = document.createElement("label");
        dLabel.textContent = `Description ${i}`;
        const dInput = document.createElement("input");

        const rLabel = document.createElement("label");
        rLabel.textContent = `Remark ${i}`;
        const rSelect = document.createElement("select");

        ["Good", "Defective", "For Repair"].forEach(r => {
            const opt = document.createElement("option");
            opt.value = r;
            opt.textContent = r;
            rSelect.appendChild(opt);
        });

        wrapper.appendChild(sLabel);
        wrapper.appendChild(sInput);
        wrapper.appendChild(dLabel);
        wrapper.appendChild(dInput);
        wrapper.appendChild(rLabel);
        wrapper.appendChild(rSelect);

        container.appendChild(wrapper);
    }
}

/* GROUPED PDF (UNCHANGED) */
function exportPDF() {
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF("l", "mm", "a4");

    const grouped = {
        "Good": [],
        "Defective": [],
        "For Repair": []
    };

    document.querySelectorAll(".section").forEach(section => {

        const equipment = section.querySelector(".Peripherals")?.value || "-";
        const brand = section.querySelector(".brand")?.value || "-";

        const inputs = section.querySelectorAll(".Description input");
        const selects = section.querySelectorAll(".Description select");

        let remarkIndex = 0;

        for (let i = 0; i < inputs.length; i += 2) {

            const serial = inputs[i]?.value || "-";
            const desc = inputs[i + 1]?.value || "-";
            const remark = selects[remarkIndex]?.value || "Good";

            grouped[remark].push([
                equipment,
                brand,
                serial,
                desc
            ]);

            remarkIndex++;
        }
    });

    let y = 25;

    const draw = (title, rows) => {
        if (!rows.length) return;

        pdf.text(title, 14, y);
        y += 4;

        pdf.autoTable({
            startY: y,
            head: [["Equipment", "Brand", "Serial", "Description"]],
            body: rows,
            theme: "grid",
            styles: { fontSize: 8 },
            didDrawPage: (data) => {
                y = data.cursor.y + 10;
            }
        });
    };

    draw("GOOD", grouped["Good"]);
    draw("DEFECTIVE", grouped["Defective"]);
    draw("FOR REPAIR", grouped["For Repair"]);

    pdf.save("pullout-form-grouped.pdf");
}
</script>

</body>
</html>
