<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - MIS System</title>
    <style>
        body {
            background: linear-gradient(to bottom right, #F0FFF0, #FFF8DC);
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
        }
        .panel {
            background: linear-gradient(to bottom right, #90EE90, #FFDAB9);
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
        }
        h1 {
            color: #333;
        }
        ul {
            list-style-type: none;
            padding: 0;
        }
        li {
            margin: 10px 0;
        }
        a {
            text-decoration: none;
            color: #007BFF;
            font-weight: bold;
        }
        a:hover {
            color: #0056b3;
        }
    </style>
</head>
<body>
    <div class="panel">
        <h1>Admin Management Panel</h1>
        <p>Welcome, Admin! Here you can manage the system.</p>
        <ul>
            <li><a href="/user-management">Manage Users</a></li>
            <li><a href="/system-settings">System Settings</a></li>
            <li><a href="/reports">View Reports</a></li>
            <li><a href="/">Logout</a></li>
        </ul>
    </div>
</body>
</html>
